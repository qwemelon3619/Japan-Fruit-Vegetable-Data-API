services:
  db:
    image: postgres:16-alpine
    container_name: japan-data-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      TZ: ${POSTGRES_TIMEZONE:-Asia/Tokyo}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_EXPOSE_PORT:-5444}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?set in .env} -d ${POSTGRES_DB:?set in .env}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: japan-data-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${POSTGRES_TIMEZONE:-Asia/Tokyo}
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      POSTGRES_TIMEZONE: ${POSTGRES_TIMEZONE:-Asia/Tokyo}
      HTTP_PORT: ${HTTP_PORT:-8080}
      MONITOR_OUT_DIR: /data/monitoring/csv
      SNAPSHOT_FILE: /data/monitoring/csv/snapshots.csv
    command: "api"
    expose:
      - "${HTTP_PORT:-8080}"
    volumes:
      - ./data/monitoring/csv:/data/monitoring/csv

  nginx:
    image: nginx:1.27-alpine
    container_name: japan-data-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_EXPOSE_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  pipeline-cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: japan-data-pipeline-cron
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${POSTGRES_TIMEZONE:-Asia/Tokyo}
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      PROJECT_ROOT: /app
      DATA_ROOT: /data
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      POSTGRES_TIMEZONE: ${POSTGRES_TIMEZONE:-Asia/Tokyo}
      DAILY_INGEST_SCHEDULE: ${DAILY_INGEST_SCHEDULE:-0 10 * * *}
      MONITOR_SNAPSHOT_SCHEDULE: ${MONITOR_SNAPSHOT_SCHEDULE:-*/5 * * * *}
      API_BASE_URL: http://api:8080
      MONITOR_OUT_DIR: /data/monitoring/csv
      SNAPSHOT_FILE: /data/monitoring/csv/snapshots.csv
    command: "start-cron.sh"
    volumes:
      - ./data/data_downloads:/data/data_downloads
      - ./data/monitoring/csv:/data/monitoring/csv
      - ./logs:/data/logs

volumes:
  pgdata:
